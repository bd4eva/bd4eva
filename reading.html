<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BD4EVA — Reading</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<style>
  :root {
    --black: #080808;
    --white: #f0ede6;
    --accent: #00c2b8;
    --accent-dark: #009e96;
    --muted: #aaa;
    --border: #1c1c1c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { overflow-x: hidden; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .page-header {
    max-width: 900px;
    margin: 0 auto;
    padding: 28px 20px 40px;
    position: relative;
  }

  .back-link {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-decoration: none;
    display: inline-block;
    margin-bottom: 24px;
    padding: 12px 0;
    transition: opacity 0.15s;
  }
  .back-link:hover { opacity: 0.75; }

  /* ── NAV HAMBURGER ── */
  .nav-toggle {
    position: absolute;
    top: 28px;
    right: 20px;
    background: none;
    border: 1px solid var(--border);
    color: var(--white);
    cursor: pointer;
    min-width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    transition: border-color 0.15s;
    z-index: 100;
  }
  .nav-toggle:hover { border-color: var(--accent); color: var(--accent); }
  .nav-toggle svg { width: 16px; height: 16px; display: block; }

  .nav-dropdown {
    position: absolute;
    top: 72px;
    right: 20px;
    background: #111;
    border: 1px solid var(--border);
    min-width: 160px;
    z-index: 200;
    display: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .nav-dropdown.open { display: block; }

  .nav-item {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--white);
    text-decoration: none;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    transition: color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-item:last-child { border-bottom: none; }
  .nav-item:hover { color: var(--accent); background: #181818; }
  .nav-item.active { color: var(--accent); }

  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 10vw, 96px);
    line-height: 0.9;
    letter-spacing: 0.02em;
    color: var(--white);
    margin-bottom: 14px;
  }

  .page-subhead {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--muted);
    font-weight: 300;
  }

  /* ── ALL-TIME STATS ── */
  .alltime-stats {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px 20px;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  .alltime-stats .year-stat:last-child {
    grid-column: 1 / -1;
    justify-self: center;
    min-width: 120px;
  }
  @media (min-width: 480px) {
    .alltime-stats {
      grid-template-columns: repeat(3, 1fr);
    }
    .alltime-stats .year-stat:last-child {
      grid-column: auto;
      justify-self: auto;
    }
  }

  /* ── YEAR NAV ── */
  .year-nav {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--black);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .year-nav::-webkit-scrollbar { display: none; }

  .year-nav-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 10px 14px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .year-nav-btn:hover,
  .year-nav-btn.active {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── SECTIONS ── */
  .section {
    max-width: 900px;
    margin: 0 auto;
    padding: 60px 20px 0;
  }
  .section:last-of-type { padding-bottom: 80px; }

  .section {
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .section.is-visible {
    opacity: 1;
    transform: translateY(0);
  }

  .section-rule {
    width: 100%;
    height: 2px;
    background: var(--accent);
    margin-bottom: 16px;
    opacity: 0;
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.5s ease, opacity 0.3s ease;
  }
  .section.is-visible .section-rule {
    opacity: 1;
    transform: scaleX(1);
  }

  .section-heading-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
  }

  .section-heading {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(32px, 5vw, 48px);
    color: var(--white);
    border-left: 3px solid var(--accent);
    padding-left: 16px;
    line-height: 1;
    margin-bottom: 0;
  }

  .share-btn {
    background: none;
    border: none;
    padding: 8px;
    cursor: pointer;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    transition: color 0.15s;
  }
  .share-btn:hover { color: var(--white); }

  .share-tooltip {
    position: absolute;
    bottom: calc(100% + 4px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--black);
    color: var(--white);
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.06em;
    padding: 3px 7px;
    border: 1px solid var(--border);
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .share-tooltip.show { opacity: 1; }

  /* ── YEAR STATS ── */
  .year-stats {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 28px;
  }

  .year-stat {
    border: 1px solid var(--border);
    padding: 10px 14px;
    min-width: 72px;
  }

  .year-stat-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 3px;
  }

  .year-stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── BOOK CARDS ── */
  .book-list {
    display: flex;
    flex-direction: column;
  }

  .book-card {
    display: flex;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    align-items: flex-start;
  }
  .book-card:last-child { border-bottom: none; }

  .book-cover {
    width: 52px;
    height: 78px;
    flex-shrink: 0;
    object-fit: cover;
    border-radius: 2px;
    display: block;
    background: #111;
  }

  .book-cover-placeholder {
    width: 52px;
    height: 78px;
    flex-shrink: 0;
    background: #1c1c1c;
    border-radius: 2px;
  }

  .book-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 3px;
    padding-top: 2px;
  }

  .book-title {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--white);
    line-height: 1.3;
  }

  .book-author {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.03em;
  }

  .book-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 5px;
    flex-wrap: wrap;
  }

  .book-date {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: #555;
    letter-spacing: 0.04em;
  }

  .book-pages {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  .book-in-progress {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .book-stars {
    font-size: 12px;
    letter-spacing: 1px;
    line-height: 1;
  }
  .star-filled { color: var(--accent); }
  .star-empty  { color: #2a2a2a; }

  /* ── RANKED CARD ── */
  #ranked-card-slot {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px 20px 0;
  }

  .ranked-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px;
    background: #111;
    border: 1px solid var(--border);
    border-radius: 4px;
    text-decoration: none;
    transition: border-color 0.15s;
  }
  .ranked-card:hover { border-color: var(--accent); }

  .ranked-card-text {}

  .ranked-card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--white);
    line-height: 1;
    margin-bottom: 4px;
  }

  .ranked-card-sub {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .ranked-card-cta {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 7px 12px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ── LOADING / ERROR ── */
  .status-msg {
    max-width: 900px;
    margin: 0 auto;
    padding: 60px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  /* ── BACK TO TOP ── */
  #back-to-top {
    position: fixed;
    bottom: 24px;
    right: 20px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--accent);
    color: var(--black);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    -webkit-tap-highlight-color: transparent;
  }

  #back-to-top.visible {
    opacity: 1;
    pointer-events: auto;
  }

  #back-to-top:hover { background: var(--accent-dark); }

  /* ── FOOTER ── */
  footer {
    max-width: 900px;
    margin: 0 auto;
    border-top: 1px solid var(--border);
    padding: 28px 20px 36px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-text {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .footer-link {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
  }
  .footer-link:hover { color: var(--accent-dark); }
</style>

<script>
const RATING_COLORS = { 5: '#4ade80', 4: '#a3e635', 3: '#facc15', 2: '#fb923c', 1: '#f87171' };
function ratingBorderColor(rating) {
  return RATING_COLORS[Math.round(rating)] || '#1c1c1c';
}

const BOOK_COVER_OVERRIDES = {
  "Long Island Golf": "/covers/books/long-island-golf.jpg",
  "The Worst Kind of Monsters": "/covers/books/the-worst-kind-of-monsters.jpg"
};

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function formatDate(str) {
  if (!str) return '';
  const [y, m] = str.split('-');
  return MONTHS[parseInt(m, 10) - 1] + ' ' + y;
}

function renderStars(rating) {
  const stars = rating != null ? Math.round(rating) : 0;
  let out = '';
  for (let i = 1; i <= 5; i++) {
    out += `<span class="${i <= stars ? 'star-filled' : 'star-empty'}">★</span>`;
  }
  return out;
}

function finishedAt(ub) {
  return ub.user_book_reads && ub.user_book_reads.length
    ? ub.user_book_reads[0].finished_at : null;
}

function buildCurrentlyReadingSection(books) {
  if (!books || books.length === 0) return null;

  const section = document.createElement('div');
  section.className = 'section';

  section.innerHTML = `
    <div class="section-rule"></div>
    <h2 class="section-heading">Currently Reading</h2>
    <div class="book-list"></div>
  `;

  const list = section.querySelector('.book-list');
  books.forEach(ub => {
    const b = ub.book;
    const author = b.contributions && b.contributions.length
      ? b.contributions[0].author.name : '';
    const imgUrl = BOOK_COVER_OVERRIDES[b.title] || (b.image && b.image.url);

    const card = document.createElement('div');
    card.className = 'book-card';
    card.style = 'border-left: 3px solid #1c1c1c; padding-left: 10px;';
    card.innerHTML = `
      ${imgUrl
        ? `<img class="book-cover" src="${imgUrl}" alt="${b.title.replace(/"/g,'&quot;')}" loading="lazy">`
        : `<div class="book-cover-placeholder"></div>`}
      <div class="book-info">
        <div class="book-title">${b.title}</div>
        ${author ? `<div class="book-author">${author}</div>` : ''}
        <div class="book-meta">
          ${b.pages ? `<span class="book-pages">${b.pages.toLocaleString()} pp</span>` : ''}
          <span class="book-in-progress">In Progress</span>
        </div>
      </div>
    `;
    list.appendChild(card);
  });

  return section;
}

function buildYearSection(year, books) {
  // Sort: most recent first
  books.sort((a, b) => (finishedAt(b) || '').localeCompare(finishedAt(a) || ''));

  const count = books.length;
  const pages = books.reduce((s, ub) => s + (ub.book.pages || 0), 0);
  const rated = books.filter(ub => ub.rating != null && ub.rating > 0);
  const avgRating = rated.length
    ? (rated.reduce((s, ub) => s + ub.rating, 0) / rated.length).toFixed(1)
    : null;

  // Most read author (overrides resolve ties)
  const AUTHOR_OVERRIDES = { '2024': 'BROM', '2025': 'Nat Cassidy' };
  const authorCount = {};
  books.forEach(ub => {
    const name = ub.book.contributions && ub.book.contributions.length
      ? ub.book.contributions[0].author.name : null;
    if (name) authorCount[name] = (authorCount[name] || 0) + 1;
  });
  const override = AUTHOR_OVERRIDES[year];
  const topEntry = override && authorCount[override]
    ? [override, authorCount[override]]
    : Object.entries(authorCount).sort((a, b) => b[1] - a[1])[0];

  const section = document.createElement('div');
  section.className = 'section';
  section.id = `year-${year}`;

  const topAuthorStat = topEntry && topEntry[1] > 1
    ? `<div class="year-stat">
        <div class="year-stat-number" style="font-size:clamp(12px,3vw,18px);line-height:1.2;">${topEntry[0]}</div>
        <div class="year-stat-label">Most Read (${topEntry[1]})</div>
       </div>` : '';

  section.innerHTML = `
    <div class="section-rule"></div>
    <div class="section-heading-row">
      <h2 class="section-heading">${year}</h2>
      <button class="share-btn" data-year="${year}" aria-label="Share ${year}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        <span class="share-tooltip">Copied!</span>
      </button>
    </div>
    <div class="year-stats">
      <div class="year-stat">
        <div class="year-stat-number">${count}</div>
        <div class="year-stat-label">Books</div>
      </div>
      <div class="year-stat">
        <div class="year-stat-number">${pages.toLocaleString()}</div>
        <div class="year-stat-label">Pages</div>
      </div>
      ${avgRating ? `<div class="year-stat">
        <div class="year-stat-number">${avgRating} ★</div>
        <div class="year-stat-label">Avg Rating</div>
      </div>` : ''}
      ${topAuthorStat}
    </div>
    <div class="book-list"></div>
  `;

  const list = section.querySelector('.book-list');
  books.forEach(ub => {
    const b = ub.book;
    const author = b.contributions && b.contributions.length
      ? b.contributions[0].author.name : '';
    const finished = finishedAt(ub);
    const imgUrl = BOOK_COVER_OVERRIDES[b.title] || (b.image && b.image.url);

    const card = document.createElement('div');
    card.className = 'book-card';
    card.style = `border-left: 3px solid ${ratingBorderColor(ub.rating)}; padding-left: 10px;`;
    card.innerHTML = `
      ${imgUrl
        ? `<img class="book-cover" src="${imgUrl}" alt="${b.title.replace(/"/g,'&quot;')}" loading="lazy">`
        : `<div class="book-cover-placeholder"></div>`}
      <div class="book-info">
        <div class="book-title">${b.title}</div>
        ${author ? `<div class="book-author">${author}</div>` : ''}
        <div class="book-meta">
          ${finished ? `<span class="book-date">${formatDate(finished)}</span>` : ''}
          ${b.pages ? `<span class="book-pages">${b.pages.toLocaleString()} pp</span>` : ''}
          ${ub.rating != null && ub.rating > 0
            ? `<span class="book-stars">${renderStars(ub.rating)}</span>` : ''}
        </div>
      </div>
    `;
    list.appendChild(card);
  });

  return section;
}

async function load() {
  const content = document.getElementById('content');
  try {
    const res = await fetch('/api/books');

    if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);

    const json = await res.json();
    if (json.errors) throw new Error(json.errors[0].message);
    if (!json.data || !json.data.me || !json.data.me[0]) throw new Error('Unexpected API response shape');

    const userBooks = json.data.me[0].user_books || [];
    const currentlyReading = json.currentlyReading || [];

    // Group by year
    const byYear = {};
    userBooks.forEach(ub => {
      const d = finishedAt(ub);
      if (!d) return;
      const y = d.slice(0, 4);
      if (!byYear[y]) byYear[y] = [];
      byYear[y].push(ub);
    });

    content.innerHTML = '';

    if (Object.keys(byYear).length === 0) {
      content.innerHTML = `<div class="status-msg">No finished books found.</div>`;
      return;
    }

    // All-time stats
    const totalBooks = userBooks.filter(ub => finishedAt(ub)).length;
    const totalPages = userBooks.reduce((s, ub) => s + (ub.book.pages || 0), 0);
    const years = Object.keys(byYear).map(Number).sort((a, b) => a - b);
    const earliestYear = years[0];
    const currentYear = new Date().getFullYear();
    const yearsLabel = earliestYear === currentYear ? String(currentYear) : `${earliestYear} \u2013 ${currentYear}`;
    const alltimeEl = document.getElementById('alltime-stats');
    alltimeEl.className = 'alltime-stats';
    alltimeEl.innerHTML = `
      <div class="year-stat">
        <div class="year-stat-number">${totalBooks}</div>
        <div class="year-stat-label">Books Read</div>
      </div>
      <div class="year-stat">
        <div class="year-stat-number">${totalPages.toLocaleString()}</div>
        <div class="year-stat-label">Pages Read</div>
      </div>
      <div class="year-stat">
        <div class="year-stat-number" style="font-size:clamp(14px,3vw,22px);line-height:1.2;">${yearsLabel}</div>
        <div class="year-stat-label">Years Tracked</div>
      </div>
    `;

    document.getElementById('ranked-card-slot').innerHTML = `
      <a href="tiers.html" class="ranked-card">
        <div class="ranked-card-text">
          <div class="ranked-card-title">Ranked</div>
          <div class="ranked-card-sub">Every year. Every book. Sorted.</div>
        </div>
        <div class="ranked-card-cta">View Tiers →</div>
      </a>
    `;

    const currentSection = buildCurrentlyReadingSection(currentlyReading);
    if (currentSection) content.appendChild(currentSection);

    const sortedYears = Object.keys(byYear).sort((a, b) => b - a);
    sortedYears.forEach(year => content.appendChild(buildYearSection(year, byYear[year])));

    // Build year nav
    const yearNav = document.getElementById('yearNav');
    yearNav.innerHTML = '';
    sortedYears.forEach((year, i) => {
      const btn = document.createElement('button');
      btn.className = 'year-nav-btn' + (i === 0 ? ' active' : '');
      btn.textContent = year;
      btn.addEventListener('click', () => {
        document.getElementById(`year-${year}`).scrollIntoView({ behavior: 'smooth' });
      });
      yearNav.appendChild(btn);
    });
    yearNav.style.display = '';

    // Animate sections on scroll (fade-in-up + section-rule)
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('is-visible');
          observer.unobserve(e.target);
        }
      });
    }, { rootMargin: '0px 0px -60px 0px' });
    document.querySelectorAll('.section').forEach(s => observer.observe(s));

    // Immediately reveal first section without waiting for scroll
    const firstSection = document.querySelector('.section');
    if (firstSection) firstSection.classList.add('is-visible');

    const activeObserver = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const year = e.target.id.replace('year-', '');
          document.querySelectorAll('.year-nav-btn').forEach(btn => {
            btn.classList.toggle('active', btn.textContent === year);
          });
        }
      });
    }, { rootMargin: '-20% 0px -70% 0px' });
    sortedYears.forEach(year => {
      const el = document.getElementById(`year-${year}`);
      if (el) activeObserver.observe(el);
    });

  } catch (err) {
    content.innerHTML = `<div class="status-msg">Couldn't load books — ${err.message}</div>`;
    console.error(err);
  }
}

load();

document.addEventListener('click', e => {
  const btn = e.target.closest('.share-btn');
  if (!btn) return;
  const year = btn.dataset.year;
  const url = window.location.origin + window.location.pathname + `#year-${year}`;
  const tooltip = btn.querySelector('.share-tooltip');
  if (navigator.share) {
    navigator.share({ title: `BD4EVA – ${year}`, url });
  } else {
    navigator.clipboard.writeText(url).then(() => {
      tooltip.classList.add('show');
      setTimeout(() => tooltip.classList.remove('show'), 1800);
    });
  }
});

const backToTop = document.getElementById('back-to-top');
window.addEventListener('scroll', () => {
  backToTop.classList.toggle('visible', window.scrollY > 300);
}, { passive: true });
backToTop.addEventListener('click', () => {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

const navToggle = document.getElementById('navToggle');
const navDropdown = document.getElementById('navDropdown');
navToggle.addEventListener('click', (e) => {
  e.stopPropagation();
  const isOpen = navDropdown.classList.toggle('open');
  navToggle.setAttribute('aria-expanded', isOpen);
});
document.addEventListener('click', (e) => {
  if (!navToggle.contains(e.target) && !navDropdown.contains(e.target)) {
    navDropdown.classList.remove('open');
    navToggle.setAttribute('aria-expanded', 'false');
  }
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    navDropdown.classList.remove('open');
    navToggle.setAttribute('aria-expanded', 'false');
  }
});
</script>
</body>
