<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BD4EVA — Ranked</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #080808;
    --white: #f0ede6;
    --accent: #00c2b8;
    --accent-dark: #009e96;
    --muted: #aaa;
    --border: #1c1c1c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { overflow-x: hidden; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .page-header {
    max-width: 900px;
    margin: 0 auto;
    padding: 28px 20px 40px;
    position: relative;
  }

  .header-links {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
  }

  .back-link {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-decoration: none;
    display: inline-block;
    padding: 12px 0;
    transition: opacity 0.15s;
  }
  .back-link:hover { opacity: 0.75; }

  /* ── NAV HAMBURGER ── */
  .nav-toggle {
    position: absolute;
    top: 28px;
    right: 20px;
    background: none;
    border: 1px solid var(--border);
    color: var(--white);
    cursor: pointer;
    min-width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    transition: border-color 0.15s;
    z-index: 100;
  }
  .nav-toggle:hover { border-color: var(--accent); color: var(--accent); }
  .nav-toggle svg { width: 16px; height: 16px; display: block; }

  .nav-dropdown {
    position: absolute;
    top: 72px;
    right: 20px;
    background: #111;
    border: 1px solid var(--border);
    min-width: 160px;
    z-index: 200;
    display: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .nav-dropdown.open { display: block; }

  .nav-item {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--white);
    text-decoration: none;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    transition: color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-item:last-child { border-bottom: none; }
  .nav-item:hover { color: var(--accent); background: #181818; }
  .nav-item.active { color: var(--accent); }

  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 10vw, 96px);
    line-height: 0.9;
    letter-spacing: 0.02em;
    color: var(--white);
    margin-bottom: 14px;
  }

  .page-subhead {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--muted);
    font-weight: 300;
  }

  /* ── STICKY YEAR NAV ── */
  .year-nav {
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--black);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .year-nav::-webkit-scrollbar { display: none; }

  .year-nav-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 10px 14px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .year-nav-btn:hover,
  .year-nav-btn.active {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── YEAR SECTIONS ── */
  .year-section {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px 0;
    border-bottom: 1px solid var(--border);
  }
  .year-section:last-of-type {
    border-bottom: none;
    padding-bottom: 80px;
  }

  .year-heading-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .year-heading {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(32px, 5vw, 48px);
    color: var(--white);
    border-left: 3px solid var(--accent);
    padding-left: 16px;
    line-height: 1;
    margin-bottom: 0;
  }

  .share-btn {
    background: none;
    border: none;
    padding: 8px;
    cursor: pointer;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    transition: color 0.15s;
  }
  .share-btn:hover { color: var(--white); }

  .share-tooltip {
    position: absolute;
    bottom: calc(100% + 4px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--black);
    color: var(--white);
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.06em;
    padding: 3px 7px;
    border: 1px solid var(--border);
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .share-tooltip.show { opacity: 1; }

  /* ── SECTION ANIMATION ── */
  .year-section {
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .year-section.is-visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ── TIER LIST ── */
  .tier-list {
    display: flex;
    flex-direction: column;
  }

  .tier-row {
    display: flex;
    align-items: stretch;
    border-bottom: 1px solid var(--border);
    min-height: 94px;
    overflow: visible;
  }
  .tier-row:last-child { border-bottom: none; }

  /* ── TIER LABEL COLUMN ── */
  .tier-left {
    width: 100px;
    flex-shrink: 0;
    display: flex;
    align-items: stretch;
  }

  .tier-color-bar {
    width: 4px;
    flex-shrink: 0;
  }

  .tier-label-inner {
    padding: 10px 8px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
  }

  .tier-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    line-height: 1.1;
  }

  .tier-count {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.03em;
  }

  /* ── TIER COVERS ── */
  .tier-covers-wrap {
    position: relative;
    overflow-x: auto;
    overflow-y: visible;
    flex: 1;
  }
  .tier-covers-wrap::after {
    content: '';
    position: absolute;
    top: 0;
    right: 0;
    width: 32px;
    height: 100%;
    background: linear-gradient(to right, transparent, #080808);
    pointer-events: none;
    z-index: 2;
  }

  .tier-covers {
    overflow-x: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .tier-covers::-webkit-scrollbar { display: none; }

  .tier-empty {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
    padding: 0 4px;
  }

  /* ── COVER CARDS ── */
  .cover-wrap { position: relative; flex-shrink: 0; cursor: pointer; }
  .cover-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.15s; border-radius: 2px; pointer-events: none; }
  .cover-overlay-text { font-family: 'DM Mono', monospace; font-size: 9px; color: #f0ede6; text-align: center; padding: 4px; line-height: 1.4; word-break: break-word; }
  .cover-wrap.active .cover-overlay { opacity: 1; }

  .cover-img {
    width: 52px;
    height: 78px;
    object-fit: cover;
    border-radius: 2px;
    display: block;
  }

  .cover-placeholder {
    width: 52px;
    height: 78px;
    background: #1c1c1c;
    border-radius: 2px;
    display: block;
  }


  /* ── LOADING / ERROR ── */
  .status-msg {
    max-width: 900px;
    margin: 0 auto;
    padding: 60px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  /* ── BACK TO TOP ── */
  #back-to-top {
    position: fixed;
    bottom: 24px;
    right: 20px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--accent);
    color: var(--black);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    -webkit-tap-highlight-color: transparent;
  }

  #back-to-top.visible {
    opacity: 1;
    pointer-events: auto;
  }

  #back-to-top:hover { background: var(--accent-dark); }

  /* ── FOOTER ── */
  footer {
    max-width: 900px;
    margin: 0 auto;
    border-top: 1px solid var(--border);
    padding: 28px 20px 36px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-text {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .footer-link {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
  }
  .footer-link:hover { color: var(--accent-dark); }
</style>
<script defer src="https://cloud.umami.is/script.js" data-website-id="94186075-b02f-441a-b3e7-9ff530b978eb"></script>
</head>
<body>

<div class="page-header">
  <button class="nav-toggle" id="navToggle" aria-label="Menu" aria-expanded="false">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="6" x2="21" y2="6"></line>
      <line x1="3" y1="12" x2="21" y2="12"></line>
      <line x1="3" y1="18" x2="21" y2="18"></line>
    </svg>
  </button>
  <div class="nav-dropdown" id="navDropdown" role="menu">
    <a href="music.html" class="nav-item" role="menuitem" data-umami-event="nav-music">Music</a>
    <a href="reading.html" class="nav-item active" role="menuitem" data-umami-event="nav-reading">Reading</a>
    <a href="index.html" class="nav-item" role="menuitem" data-umami-event="nav-projects">Projects</a>
  </div>
  <div class="header-links">
    <a href="index.html" class="back-link">← BD4EVA</a>
  </div>
  <h1 class="page-title">RANKED</h1>
  <p class="page-subhead">Every year. Every book. Sorted by how much I liked them.</p>
</div>

<nav class="year-nav" id="yearNav">
  <button class="year-nav-btn active" data-year="2026">2026</button>
  <button class="year-nav-btn" data-year="2025">2025</button>
  <button class="year-nav-btn" data-year="2024">2024</button>
</nav>

<div id="tiers-content">
  <div class="status-msg">Loading...</div>
</div>

<footer>
  <a href="https://instagram.com/bd4eva" target="_blank" class="footer-link">@bd4eva</a>
  <div class="footer-text">2016 – 2026</div>
</footer>

<button id="back-to-top" aria-label="Back to top">↑</button>

<script>
const COVER_OVERRIDES = {
  "Long Island Golf": "/covers/books/long-island-golf.jpg",
  "The Worst Kind of Monsters": "/covers/books/the-worst-kind-of-monsters.jpg"
};

const TIERS = {
  "2026": {
    "LOVED IT": ["The Eye of the Bedlam Bride", "A Parade of Horribles", "This Inevitable Ruin", "The Butcher's Masquerade"],
    "REALLY LIKED IT": ["Mother Night"],
    "WORTH A READ": [],
    "NEUTRAL": [],
    "SUCKED": ["Long Island Golf"],
    "DNF'D": []
  },
  "2025": {
    "LOVED IT": ["The Strength of the Few", "The Will of the Many", "Lonesome Dove", "The Devils", "Brother", "Razorblade Tears", "When the Wolf Comes Home", "Nobody Knows You're Here", "I Who Have Never Known Men", "Rest Stop"],
    "REALLY LIKED IT": ["The Gate of the Feral Gods", "Dark Matter", "A Knight of the Seven Kingdoms", "Stoner", "Hidden Pictures", "Maggie's Grave", "Mean Spirited", "The Buffalo Hunter Hunter", "The Girl Next Door", "Station Eleven", "Who Is Government?: The Untold Story of Public Service", "On Tyranny: Twenty Lessons from the Twentieth Century"],
    "WORTH A READ": ["How to Write One Song", "The match", "Wake Up and Open Your Eyes", "Dead of Winter", "Thornhedge", "Evil in Me", "The Dungeon Anarchist's Cookbook", "The Worst Kind of Monsters", "On the Calculation of Volume (Book I)", "The Reformatory", "The Salt Grows Heavy"],
    "NEUTRAL": ["The Wager: A Tale of Shipwreck, Mutiny and Murder", "Dark Harvest", "On the Calculation of Volume (Book II)", "Fahrenheit 451", "Red Letter Days", "Crazy Horse", "A Psalm for the Wild-Built", "A Prayer for the Crown-Shy", "Everything Is Tuberculosis: The History and Persistence of Our Deadliest Infection", "Ben Hogan's Five Lessons: The Modern Fundamentals of Golf", "The Rise and Fall of the Dinosaurs: A New History of a Lost World", "The Wide, Carnivorous Sky and Other Monstrous Geographies", "Entangled Life: How Fungi Make Our Worlds, Change Our Minds & Shape Our Futures", "Train Dreams", "The Four Agreements: A Practical Guide to Personal Freedom"],
    "SUCKED": ["This Is How You Lose the Time War", "Eynhallow", "The Subtle Art of Not Giving a F*ck: A Counterintuitive Approach to Living a Good Life", "Voice Like a Hyacinth"],
    "DNF'D": []
  },
  "2024": {
    "LOVED IT": ["Slewfoot: A Tale of Bewitchery", "Project Hail Mary", "The Spear Cuts Through Water", "The Hike", "Dungeon Crawler Carl", "Piranesi", "A Short Stay in Hell"],
    "REALLY LIKED IT": ["The Sword of Kaigen", "Redshirts", "Carl's Doomsday Scenario", "Krampus: The Yule Lord", "1984", "Look Closer", "The Haar", "FantasticLand", "Clown in a Cornfield", "Mary: An Awakening of Terror"],
    "WORTH A READ": ["The Fisherman", "The Road", "Small Things Like These", "Diavola", "The Troop", "Intercepts"],
    "NEUTRAL": ["Mythos: The Greek Myths Retold", "The Old Man and the Sea", "A Head Full of Ghosts", "The Butcher of the Forest", "The Wood at Midwinter", "Un chant de Noël"],
    "SUCKED": ["The Last House on Needless Street", "The Legend of Sleepy Hollow"],
    "DNF'D": []
  }
};

const TIER_ORDER = ["LOVED IT", "REALLY LIKED IT", "WORTH A READ", "NEUTRAL", "SUCKED", "DNF'D"];
const TIER_COLORS = {
  "LOVED IT":       "#4ade80",
  "REALLY LIKED IT":"#a3e635",
  "WORTH A READ":   "#facc15",
  "NEUTRAL":        "#fb923c",
  "SUCKED":         "#f87171",
  "DNF'D":          "#9ca3af"
};

async function load() {
  // Build title → cover URL map from API
  const imageMap = {};
  try {
    const res = await fetch('/api/books');
    if (res.ok) {
      const json = await res.json();
      // Finished books
      if (json.data && json.data.me && json.data.me[0]) {
        (json.data.me[0].user_books || []).forEach(ub => {
          if (ub.book && ub.book.title && ub.book.image && ub.book.image.url) {
            imageMap[ub.book.title] = ub.book.image.url;
          }
        });
      }
      // Currently reading books — same cover data, include so no gaps
      (json.currentlyReading || []).forEach(ub => {
        if (ub.book && ub.book.title && ub.book.image && ub.book.image.url) {
          imageMap[ub.book.title] = ub.book.image.url;
        }
      });
    }
  } catch (e) {
    console.warn('Could not load covers from API:', e);
  }

  const container = document.getElementById('tiers-content');
  container.innerHTML = '';

  const years = Object.keys(TIERS).sort((a, b) => b - a);

  years.forEach(year => {
    const section = document.createElement('section');
    section.className = 'year-section';
    section.id = `year-${year}`;

    const headingRow = document.createElement('div');
    headingRow.className = 'year-heading-row';
    headingRow.innerHTML = `
      <h2 class="year-heading">${year}</h2>
      <button class="share-btn" data-year="${year}" aria-label="Share ${year}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        <span class="share-tooltip">Copied!</span>
      </button>
    `;
    section.appendChild(headingRow);

    const tierList = document.createElement('div');
    tierList.className = 'tier-list';

    TIER_ORDER.forEach(tierName => {
      const books = TIERS[year][tierName] || [];
      const color = TIER_COLORS[tierName];
      const countText = books.length === 1 ? '1 book' : `${books.length} books`;

      const row = document.createElement('div');
      row.className = 'tier-row';

      let coversHtml;
      if (books.length === 0) {
        coversHtml = '<span class="tier-empty">—</span>';
      } else {
        coversHtml = books.map(title => {
          const src = COVER_OVERRIDES[title] || imageMap[title];
          const safe = title.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
          const img = src
            ? `<img class="cover-img" src="${src}" alt="${safe}" loading="lazy">`
            : `<div class="cover-placeholder"></div>`;
          return `<div class="cover-wrap">${img}<div class="cover-overlay"><div class="cover-overlay-text">${safe}</div></div></div>`;
        }).join('');
      }

      row.innerHTML = `
        <div class="tier-left">
          <div class="tier-color-bar" style="background:${color}"></div>
          <div class="tier-label-inner">
            <div class="tier-name" style="color:${color}">${tierName}</div>
            <div class="tier-count">${countText}</div>
          </div>
        </div>
        <div class="tier-covers-wrap"><div class="tier-covers">${coversHtml}</div></div>
      `;
      tierList.appendChild(row);
    });

    section.appendChild(tierList);
    container.appendChild(section);
  });

  // Fade-in-up animation as sections enter viewport
  const fadeObserver = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('is-visible');
        fadeObserver.unobserve(e.target);
      }
    });
  }, { rootMargin: '0px 0px -60px 0px' });

  document.querySelectorAll('.year-section').forEach(s => fadeObserver.observe(s));

  // Immediately reveal first section without waiting for scroll
  const firstSection = document.querySelector('.year-section');
  if (firstSection) firstSection.classList.add('is-visible');

  // Active year tracking on scroll
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const year = e.target.id.replace('year-', '');
        document.querySelectorAll('.year-nav-btn').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.year === year);
        });
      }
    });
  }, { rootMargin: '-30% 0px -60% 0px' });

  document.querySelectorAll('.year-section').forEach(s => observer.observe(s));
}

// Year nav smooth scroll
document.querySelectorAll('.year-nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const target = document.getElementById(`year-${btn.dataset.year}`);
    if (target) target.scrollIntoView({ behavior: 'smooth' });
  });
});

// Tap to reveal inline title below cover
document.getElementById('tiers-content').addEventListener('click', e => {
  const wrap = e.target.closest('.cover-wrap');
  if (!wrap) return;
  const isActive = wrap.classList.contains('active');
  document.querySelectorAll('.cover-wrap.active').forEach(w => w.classList.remove('active'));
  if (!isActive) wrap.classList.add('active');
});

load();

document.addEventListener('click', e => {
  const btn = e.target.closest('.share-btn');
  if (!btn) return;
  const year = btn.dataset.year;
  const url = window.location.origin + window.location.pathname + `#year-${year}`;
  const tooltip = btn.querySelector('.share-tooltip');
  if (navigator.share) {
    navigator.share({ title: `BD4EVA – ${year}`, url });
  } else {
    navigator.clipboard.writeText(url).then(() => {
      tooltip.classList.add('show');
      setTimeout(() => tooltip.classList.remove('show'), 1800);
    });
  }
});

const backToTop = document.getElementById('back-to-top');
window.addEventListener('scroll', () => {
  backToTop.classList.toggle('visible', window.scrollY > 300);
}, { passive: true });
backToTop.addEventListener('click', () => {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

const navToggle = document.getElementById('navToggle');
const navDropdown = document.getElementById('navDropdown');
navToggle.addEventListener('click', (e) => {
  e.stopPropagation();
  const isOpen = navDropdown.classList.toggle('open');
  navToggle.setAttribute('aria-expanded', isOpen);
});
document.addEventListener('click', (e) => {
  if (!navToggle.contains(e.target) && !navDropdown.contains(e.target)) {
    navDropdown.classList.remove('open');
    navToggle.setAttribute('aria-expanded', 'false');
  }
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    navDropdown.classList.remove('open');
    navToggle.setAttribute('aria-expanded', 'false');
  }
});
</script>

</body>
