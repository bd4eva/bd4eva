<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BD4EVA</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #080808;
    --white: #f0ede6;
    --accent: #00c2b8;
    --accent-dark: #009e96;
    --muted: #aaa;
    --border: #1c1c1c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { overflow-x: hidden; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    padding: 32px 24px 0;
    text-align: center;
  }

  .wordmark {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 0.2em;
    color: var(--accent);
    display: inline-block;
  }

  /* ── NAV HAMBURGER ── */
  .nav-toggle {
    position: absolute;
    top: 28px;
    right: 24px;
    background: none;
    border: 1px solid var(--border);
    color: var(--white);
    cursor: pointer;
    min-width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    transition: border-color 0.15s;
    z-index: 100;
  }
  .nav-toggle:hover { border-color: var(--accent); color: var(--accent); }
  .nav-toggle svg { width: 16px; height: 16px; display: block; }

  .nav-dropdown {
    position: absolute;
    top: 72px;
    right: 24px;
    background: #111;
    border: 1px solid var(--border);
    min-width: 160px;
    z-index: 200;
    display: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .nav-dropdown.open { display: block; }

  .nav-item {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--white);
    text-decoration: none;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    transition: color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-item:last-child { border-bottom: none; }
  .nav-item:hover { color: var(--accent); background: #181818; }
  .nav-item.active { color: var(--accent); }

  /* ── HERO ── */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px 40px;
    text-align: center;
  }

  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(64px, 18vw, 140px);
    line-height: 0.88;
    letter-spacing: 0.02em;
    color: var(--white);
    margin-bottom: 20px;
  }

  .hero-line {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 56px;
  }

  /* ── PILLAR CARDS ── */
  .pillars {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    padding: 0 20px;
  }

  .pillar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    border: 1px solid var(--border);
    padding: 24px 28px;
    text-decoration: none;
    transition: border-color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .pillar:hover { border-color: var(--accent); background: #0e0e0e; }

  .pillar-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 0.05em;
    color: var(--white);
    line-height: 1;
    text-align: left;
  }

  .pillar-meta {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 4px;
    text-align: left;
  }

  .pillar-arrow {
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    color: var(--accent);
    margin-left: 16px;
  }

  /* ── FOOTER ── */
  footer {
    padding: 28px 24px 36px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-text {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .footer-link {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
  }
  .footer-link:hover { color: var(--accent-dark); }
</style>
<script defer src="https://cloud.umami.is/script.js" data-website-id="94186075-b02f-441a-b3e7-9ff530b978eb"></script>
</head>
<body>

<header>
  <span class="wordmark">BD4EVA</span>
  <button class="nav-toggle" id="navToggle" aria-label="Menu" aria-expanded="false">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="6" x2="21" y2="6"></line>
      <line x1="3" y1="12" x2="21" y2="12"></line>
      <line x1="3" y1="18" x2="21" y2="18"></line>
    </svg>
  </button>
  <div class="nav-dropdown" id="navDropdown" role="menu">
    <a href="index.html" class="nav-item active" role="menuitem" data-umami-event="nav-home">Home</a>
    <a href="music.html" class="nav-item" role="menuitem" data-umami-event="nav-music">Music</a>
    <a href="insights.html" class="nav-item" role="menuitem" data-umami-event="nav-insights">Insights</a>
    <a href="reading.html" class="nav-item" role="menuitem" data-umami-event="nav-books">Books</a>
    <a href="tiers.html" class="nav-item" role="menuitem" data-umami-event="nav-ranked">Ranked</a>
    <a href="book.html" class="nav-item" role="menuitem" data-umami-event="nav-author">Author</a>
  </div>
</header>

<main class="hero">
  <h1 class="hero-title">BD4EVA</h1>
  <p class="hero-line">Ten years of music &amp; books — 2016 to 2026</p>
  <div class="pillars">
    <a href="music.html" class="pillar" data-umami-event="home-music-card">
      <div>
        <div class="pillar-label">Music</div>
        <div class="pillar-meta">50 mixes · 2,303 songs</div>
      </div>
      <span class="pillar-arrow">→</span>
    </a>
    <a href="reading.html" class="pillar" data-umami-event="home-reading-card">
      <div>
        <div class="pillar-label">Reading</div>
        <div class="pillar-meta">Books since 2023</div>
      </div>
      <span class="pillar-arrow">→</span>
    </a>
  </div>
</main>

<footer>
  <a href="https://instagram.com/bd4eva" target="_blank" class="footer-link">@bd4eva</a>
  <div class="footer-text">2016 – 2026</div>
</footer>

<script>
const navToggle = document.getElementById('navToggle');
const navDropdown = document.getElementById('navDropdown');
navToggle.addEventListener('click', (e) => {
  e.stopPropagation();
  const isOpen = navDropdown.classList.toggle('open');
  navToggle.setAttribute('aria-expanded', isOpen);
});
document.addEventListener('click', (e) => {
  if (!navToggle.contains(e.target) && !navDropdown.contains(e.target)) {
    navDropdown.classList.remove('open');
    navToggle.setAttribute('aria-expanded', 'false');
  }
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    navDropdown.classList.remove('open');
    navToggle.setAttribute('aria-expanded', 'false');
  }
});
</script>

</body>
</html>
